name: Run Stock Algo

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  run-algo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance vaderSentiment pyyaml pandas numpy alpaca-py

      - name: Run the algo (paper trading)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
        run: python ALGO_STANDALONE.py --execute --live

      - name: Commit report back to repo
        run: |
          git config user.name "stock-algo-bot"
          git config user.email "bot@github.com"
          git add outputs/ || true
          git diff --staged --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git push || true
